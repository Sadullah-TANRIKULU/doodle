<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Ahbap Hatay geçici depo kontrol programı">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="ahbap, sevgi, yardım, dost, afetzede">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahbap Hatay Depo | Product Tracker</title>
    <link rel="shortcut icon" href="../backend/public/assets/favico.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <!-- Dashboard Header -->
        <header>
            <div class="brand">
                <div class="brand-icon">📦</div>
                <div class="brand-info">
                    <h1>Ahbap Hatay Depo</h1>
                    <p>Relief Supplies Inventory Monitor</p>
                </div>
            </div>
            <div class="header-actions">
                <div id="connection-status" class="status-badge">Connected</div>
                <a href="https://ahbaphataydepo-service.onrender.com/logs" id="log-file-link" class="log-btn">
                    <span>📥 Download Logs</span>
                </a>
            </div>
        </header>

        <!-- Stats Overview Widgets -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-data">
                    <p>Total Items</p>
                    <h2 id="stat-total-items">0</h2>
                </div>
                <div class="stat-icon total">📋</div>
            </div>
            <div class="stat-card">
                <div class="stat-data">
                    <p>Total Units</p>
                    <h2 id="stat-total-stock">0</h2>
                </div>
                <div class="stat-icon units">📦</div>
            </div>
            <div class="stat-card">
                <div class="stat-data">
                    <p>Low Stock Items</p>
                    <h2 id="stat-low-stock">0</h2>
                </div>
                <div class="stat-icon low">⚠️</div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="dashboard-grid">
            <!-- Left Panel: Form Control -->
            <div class="glass-panel">
                <h3 class="panel-title" id="form-panel-title">Add New Product</h3>
                
                <div class="form-group">
                    <label for="input-product-name">Product Name</label>
                    <input type="text" id="input-product-name" class="input-control" placeholder="e.g. Gıda Kolisi">
                </div>
                
                <div class="form-group">
                    <label for="input-quantity">Quantity</label>
                    <input type="number" id="input-quantity" class="input-control" placeholder="e.g. 75">
                </div>

                <button id="btn-add-product" class="btn btn-primary" onclick="addProduct()">Add Product</button>
                <button id="btn-update-product" class="btn btn-warning" style="display: none;">Save Changes</button>
                <button id="btn-cancel-update" class="btn btn-cancel" style="display: none;" onclick="cancelUpdate()">Cancel Edit</button>
            </div>

            <!-- Right Panel: Registry Table -->
            <div class="glass-panel">
                <h3 class="panel-title">Stock Registry</h3>
                
                <div class="control-bar">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" class="input-control" placeholder="Search product name..." oninput="handleSearch()">
                    </div>
                </div>

                <section id="app" class="products-container"></section>
            </div>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="./script.js"></script>
</body>

</html>
